<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>资产配置方案库</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F0F2F5;
      --surface: #FFFFFF;
      --nav: #0F172A;
      --accent: #3B82F6;
      --text: #1E293B;
      --text-sub: #64748B;
      --border: #E2E8F0;
      --low: #10B981;
      --mid: #F59E0B;
      --high: #EF4444;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
    }

    body { background: var(--bg); color: var(--text); font-family: -apple-system, "PingFang SC", sans-serif; min-height: 100vh; }

    /* ── NAV ── */
    nav {
      background: var(--nav);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-logo { color: #fff; font-size: 16px; font-weight: 700; letter-spacing: -.3px; white-space: nowrap; }
    .nav-logo span { color: var(--accent); }
    .search-wrap { flex: 1; max-width: 360px; position: relative; }
    .search-wrap input {
      width: 100%;
      padding: 7px 12px 7px 36px;
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      outline: none;
    }
    .search-wrap input::placeholder { color: rgba(255,255,255,.4); }
    .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,.5); font-size: 14px; }
    .compare-badge {
      margin-left: auto;
      background: var(--accent);
      color: #fff;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      display: none;
      align-items: center;
      gap: 6px;
      border: none;
    }
    .compare-badge.visible { display: flex; }

    /* ── FILTERS ── */
    .filters {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      gap: 24px;
      align-items: center;
      flex-wrap: wrap;
    }
    .filter-group { display: flex; align-items: center; gap: 8px; }
    .filter-label { font-size: 12px; color: var(--text-sub); font-weight: 500; white-space: nowrap; }
    .pill {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 13px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-sub);
      cursor: pointer;
      transition: all .15s;
    }
    .pill.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }
    .pill:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

    /* ── GRID ── */
    .grid-header {
      padding: 20px 24px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .count-label { font-size: 14px; color: var(--text-sub); }
    .sort-select {
      padding: 5px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      outline: none;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      padding: 0 24px 40px;
    }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all .2s;
      position: relative;
    }
    .card:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,.12); }
    .card.selected { border-color: var(--accent); }

    .card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 4px; }
    .card-name { font-size: 16px; font-weight: 700; line-height: 1.3; }
    .risk-badge {
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
      margin-left: 8px;
      margin-top: 2px;
    }
    .risk-low { background: #D1FAE5; color: #065F46; }
    .risk-mid { background: #FEF3C7; color: #92400E; }
    .risk-high { background: #FEE2E2; color: #991B1B; }

    .card-creator { font-size: 12px; color: var(--text-sub); margin-bottom: 16px; }

    .chart-wrap { width: 110px; height: 110px; margin: 0 auto 16px; }

    .card-metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; text-align: center; margin-bottom: 16px; }
    .metric { background: var(--bg); border-radius: 8px; padding: 8px 4px; }
    .metric-val { font-size: 15px; font-weight: 700; }
    .metric-val.pos { color: var(--low); }
    .metric-val.neg { color: var(--high); }
    .metric-val.neu { color: var(--accent); }
    .metric-lbl { font-size: 10px; color: var(--text-sub); margin-top: 2px; }

    .card-footer { display: flex; gap: 8px; }
    .btn {
      flex: 1;
      padding: 7px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #2563EB; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-sub); }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
    .btn-outline.selected-btn { border-color: var(--accent); color: var(--accent); background: #EFF6FF; }

    .select-dot {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px;
      color: #fff;
      transition: all .15s;
    }
    .card.selected .select-dot { background: var(--accent); border-color: var(--accent); }

    /* ── MODAL ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border-radius: 16px;
      width: 100%;
      max-width: 820px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,.3);
    }
    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 24px 24px 0;
    }
    .modal-title { font-size: 22px; font-weight: 800; }
    .modal-sub { font-size: 13px; color: var(--text-sub); margin-top: 4px; }
    .modal-close {
      background: var(--bg);
      border: none;
      width: 32px; height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      color: var(--text-sub);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .modal-close:hover { background: var(--border); }
    .modal-body { padding: 20px 24px 24px; }

    .modal-top { display: grid; grid-template-columns: 200px 1fr; gap: 24px; margin-bottom: 24px; }
    @media (max-width: 600px) { .modal-top { grid-template-columns: 1fr; } }
    .modal-chart-wrap { width: 180px; height: 180px; margin: 0 auto; }

    .alloc-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .alloc-table th { color: var(--text-sub); font-weight: 500; font-size: 12px; padding: 0 0 8px; text-align: left; }
    .alloc-table td { padding: 8px 0; border-top: 1px solid var(--border); }
    .alloc-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; }
    .alloc-bar-wrap { background: var(--bg); border-radius: 4px; height: 6px; overflow: hidden; }
    .alloc-bar { height: 100%; border-radius: 4px; }

    .section-title { font-size: 13px; font-weight: 600; color: var(--text-sub); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }

    .modal-section { margin-bottom: 20px; }
    .desc-text { font-size: 14px; color: var(--text-sub); line-height: 1.7; }

    .metrics-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
    @media (max-width: 500px) { .metrics-row { grid-template-columns: repeat(2, 1fr); } }
    .metric-card { background: var(--bg); border-radius: 10px; padding: 12px; text-align: center; }
    .metric-card .val { font-size: 20px; font-weight: 800; }
    .metric-card .lbl { font-size: 11px; color: var(--text-sub); margin-top: 4px; }

    .tags-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag { background: #EFF6FF; color: #3B82F6; padding: 4px 10px; border-radius: 6px; font-size: 12px; }
    .tag.env { background: #F0FDF4; color: #15803D; }

    .etf-section { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 500px) { .etf-section { grid-template-columns: 1fr; } }
    .etf-group h4 { font-size: 12px; font-weight: 600; color: var(--text-sub); margin-bottom: 8px; }
    .etf-list { display: flex; flex-direction: column; gap: 4px; }
    .etf-item { background: var(--bg); border-radius: 6px; padding: 6px 10px; font-size: 13px; font-family: monospace; }

    /* ── COMPARE PANEL ── */
    .compare-panel {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      box-shadow: 0 -4px 20px rgba(0,0,0,.1);
      padding: 16px 24px;
      z-index: 150;
      display: none;
    }
    .compare-panel.open { display: block; }
    .compare-panel-inner { max-width: 1200px; margin: 0 auto; }
    .compare-panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .compare-panel-title { font-size: 14px; font-weight: 600; }
    .compare-close { background: none; border: none; cursor: pointer; font-size: 18px; color: var(--text-sub); }
    .compare-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .compare-table th { background: var(--bg); padding: 8px 12px; text-align: left; font-weight: 500; color: var(--text-sub); }
    .compare-table td { padding: 8px 12px; border-top: 1px solid var(--border); }
    .best { color: var(--low); font-weight: 700; }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-sub); grid-column: 1/-1; }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }

    /* ── GURU BADGE ── */
    .guru-badge { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; vertical-align: middle; margin-left: 4px; }
    .guru-intl { background: #EEF2FF; color: #4338CA; }
    .guru-cn   { background: #FFF1F2; color: #BE123C; }

    /* ── DISCLAIMER ── */
    .disclaimer {
      text-align: center;
      padding: 16px 24px 32px;
      font-size: 12px;
      color: var(--text-sub);
      border-top: 1px solid var(--border);
      margin-top: 8px;
      line-height: 1.8;
    }

    /* ── GROWTH CHART ── */
    .growth-wrap { width: 100%; height: 180px; margin: 0 0 4px; }

    /* ── AVATAR ── */
    .av {
      border-radius: 50%;
      flex-shrink: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: #fff;
      box-shadow: 0 2px 10px rgba(0,0,0,.22);
      transition: box-shadow .2s;
    }
    .av img { width: 100%; height: 100%; object-fit: cover; object-position: center top; display: block; }

    .card-header-new {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .card-header-info { flex: 1; min-width: 0; }
    .card-header-info .card-name {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }
    .card-creator-mini {
      font-size: 11px;
      color: var(--text-sub);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── RECENT PERFORMANCE ── */
    .card-recent {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      background: var(--bg);
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .recent-lbl { font-size: 11px; color: var(--text-sub); flex-shrink: 0; margin-right: 2px; }
    .recent-item { display: flex; flex-direction: column; align-items: center; flex: 1; }
    .recent-val { font-weight: 700; font-size: 13px; }
    .recent-period { font-size: 10px; color: var(--text-sub); margin-top: 1px; }
    .val-pos { color: var(--low); }
    .val-neg { color: var(--high); }
    .val-neu { color: var(--text-sub); }
    .recent-divider { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; }

    .modal-recent-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 12px;
    }
    .recent-metric-card { background: var(--bg); border-radius: 10px; padding: 12px; text-align: center; }
    .recent-metric-card .r-val { font-size: 22px; font-weight: 800; }
    .recent-metric-card .r-lbl { font-size: 11px; color: var(--text-sub); margin-top: 4px; }
    .recent-note {
      font-size: 13px;
      color: var(--text-sub);
      line-height: 1.7;
      padding: 10px 14px;
      background: #EFF6FF;
      border-radius: 8px;
      border-left: 3px solid var(--accent);
    }
    .update-date { font-size: 11px; color: var(--text-sub); margin-top: 8px; text-align: right; }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">资产<span>配置</span>方案库</div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="搜索方案名称或创始人..." />
  </div>
  <button class="compare-badge" id="compareBtn" onclick="openCompare()">
    <span>📊</span>
    <span id="compareCount">对比 0 个方案</span>
  </button>
</nav>

<!-- FILTERS -->
<div class="filters">
  <div class="filter-group">
    <span class="filter-label">风险等级</span>
    <button class="pill active" data-filter="risk" data-val="all">全部</button>
    <button class="pill" data-filter="risk" data-val="low">🟢 低风险</button>
    <button class="pill" data-filter="risk" data-val="mid">🟡 中风险</button>
    <button class="pill" data-filter="risk" data-val="high">🔴 高风险</button>
  </div>
  <div class="filter-group">
    <span class="filter-label">资产特色</span>
    <button class="pill active" data-filter="type" data-val="all">全部</button>
    <button class="pill" data-filter="type" data-val="gold">含黄金</button>
    <button class="pill" data-filter="type" data-val="intl">含境外</button>
    <button class="pill" data-filter="type" data-val="reit">含REITs</button>
    <button class="pill" data-filter="type" data-val="pure">纯股债</button>
  </div>
  <div class="filter-group">
    <span class="filter-label">来源分类</span>
    <button class="pill active" data-filter="cat" data-val="all">全部</button>
    <button class="pill" data-filter="cat" data-val="classic">📐 经典策略</button>
    <button class="pill" data-filter="cat" data-val="intl">🌍 国际大佬</button>
    <button class="pill" data-filter="cat" data-val="cn">🇨🇳 国内大佬</button>
  </div>
</div>

<!-- GRID -->
<div class="grid-header">
  <div class="count-label" id="countLabel">共 24 个方案</div>
  <select class="sort-select" id="sortSelect">
    <option value="default">默认排序</option>
    <option value="return">年化收益 ↓</option>
    <option value="drawdown">最大回撤 ↑</option>
    <option value="sharpe">夏普比率 ↓</option>
  </select>
</div>
<div class="grid" id="grid"></div>

<div class="disclaimer">
  ⚠️ 本站所有收益率、最大回撤、夏普比率等数据均为历史估算或模拟值，不代表未来表现。<br>
  大佬持仓组合基于公开披露信息整理，仅供学习参考，不构成任何投资建议。投资有风险，入市需谨慎。
</div>

<!-- DETAIL MODAL -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-sub" id="modalSub"></div>
      </div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- COMPARE PANEL -->
<div class="compare-panel" id="comparePanel">
  <div class="compare-panel-inner">
    <div class="compare-panel-header">
      <span class="compare-panel-title">方案对比</span>
      <button class="compare-close" onclick="closeComparePanel()">✕</button>
    </div>
    <div id="compareTableWrap"></div>
  </div>
</div>

function fmtPct(v) { return (v > 0 ? '+' : '') + v + '%'; }
function signCls(v) { return v > 0 ? 'val-pos' : v < 0 ? 'val-neg' : 'val-neu'; }

// Avatar: render letter placeholder, then async-upgrade to Wikipedia photo
const _wikiCache = {};
async function _fetchWikiThumb(slug) {
  if (_wikiCache[slug] !== undefined) return _wikiCache[slug];
  try {
    const r = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(slug)}`);
    const d = await r.json();
    _wikiCache[slug] = d.thumbnail?.source || null;
  } catch { _wikiCache[slug] = null; }
  return _wikiCache[slug];
}

function renderAvatarHtml(id, size) {
  const cfg = AVATAR_CFG[id] || { initials:'?', bg:['#64748b','#94a3b8'] };
  const [c1, c2] = cfg.bg;
  const txt = cfg.initials;
  const hasEmoji = /\p{Emoji_Presentation}/u.test(txt);
  const lines = txt.split('\n');
  const isMultiLine = lines.length > 1;
  let inner;
  if (isMultiLine) {
    const fs = Math.round(size * 0.30);
    inner = `<div style="display:flex;flex-direction:column;align-items:center;line-height:1.1;font-size:${fs}px">${lines.map(l=>`<span>${l}</span>`).join('')}</div>`;
  } else {
    const fs = hasEmoji ? size*0.52 : txt.length===1 ? size*0.44 : txt.length===2 ? size*0.36 : size*0.28;
    inner = `<span style="font-size:${Math.round(fs)}px;letter-spacing:-0.5px">${txt}</span>`;
  }
  return `<div class="av" data-av-id="${id}" data-av-size="${size}" style="width:${size}px;height:${size}px;background:linear-gradient(135deg,${c1},${c2})">${inner}</div>`;
}

async function upgradeAvatars(id) {
  const cfg = AVATAR_CFG[id];
  if (!cfg || cfg.type !== 'wiki') return;
  const url = await _fetchWikiThumb(cfg.slug);
  if (!url) return;
  document.querySelectorAll(`[data-av-id="${id}"]`).forEach(el => {
    el.style.background = 'none';
    el.innerHTML = `<img src="${url}" alt="">`;
  });
}

function getFiltered() {
  let data = [...SCHEMES];
  if (filters.risk !== 'all') data = data.filter(s => s.risk === filters.risk);
  if (filters.type !== 'all') {
    if (filters.type === 'gold') data = data.filter(s => s.tags.includes('gold'));
    else if (filters.type === 'intl') data = data.filter(s => s.tags.includes('intl'));
    else if (filters.type === 'reit') data = data.filter(s => s.tags.includes('reit'));
    else if (filters.type === 'pure') data = data.filter(s => s.tags.includes('pure'));
  }
  if (filters.cat !== 'all') data = data.filter(s => SCHEME_CAT[s.id] === filters.cat);
  if (searchQ) {
    const q = searchQ.toLowerCase();
    data = data.filter(s => s.name.includes(q) || s.nameEn.toLowerCase().includes(q) || s.creator.toLowerCase().includes(q));
  }
  if (sortBy === 'return') data.sort((a, b) => b.perf.ret - a.perf.ret);
  else if (sortBy === 'drawdown') data.sort((a, b) => b.perf.dd - a.perf.dd);
  else if (sortBy === 'sharpe') data.sort((a, b) => b.perf.sharpe - a.perf.sharpe);
  return data;
}

// ──────────────────────────────────────────────
// GROWTH SIMULATION
// ──────────────────────────────────────────────
function simGrowth(s, years = 10) {
  const seed = s.id.split('').reduce((a, c) => a + c.charCodeAt(0), 0);
  let r = seed;
  const rand = () => { r = (r * 1664525 + 1013904223) >>> 0; return r / 0xffffffff; };
  const monthlyRet = s.perf.ret / 100 / 12;
  const monthlyVol = s.perf.vol / 100 / Math.sqrt(12);
  let val = 10000;
  const vals = [10000];
  const labels = ['起始'];
  for (let i = 1; i <= years * 12; i++) {
    val *= (1 + monthlyRet + monthlyVol * (rand() * 2 - 1) * 0.9);
    if (val < 0) val = 0.1;
    if (i % 12 === 0) { vals.push(+val.toFixed(1)); labels.push(`第${i/12}年`); }
  }
  return { vals, labels };
}

function toggleCompare(id) {

  if (idx === -1) {
    if (selectedIds.length >= 4) { alert('最多同时对比 4 个方案'); return; }
    selectedIds.push(id);
  } else {
    selectedIds.splice(idx, 1);
  }
  updateCompareBadge();
  renderGrid();
  if (document.getElementById('comparePanel').classList.contains('open')) {
    renderCompareTable();
  }
}

  const btn = document.getElementById('compareBtn');

    countEl.textContent = `对比 ${selectedIds.length} 个方案`;
  } else {
    btn.classList.remove('visible');
    document.getElementById('comparePanel').classList.remove('open');
  }
}

  document.getElementById('comparePanel').classList.add('open');

    { key: 'vol', label: '波动率',   unit: '%', better: 'lower' },
  ];

  const bestVals = {};
  metrics.forEach(m => {
    const vals = schemes.map(s => s.perf[m.key]);
    bestVals[m.key] = m.better === 'higher' ? Math.max(...vals) : Math.min(...vals);
  });

  let html = `<div style="overflow-x:auto"><table class="compare-table">
    <thead><tr>
      <th>指标</th>
      ${schemes.map(s => `<th>${s.name}<br/><span style="font-weight:400;color:#94a3b8;font-size:11px">${riskLabel(s.risk)}</span></th>`).join('')}
    </tr></thead>
    <tbody>`;

  metrics.forEach(m => {
    html += `<tr><td style="color:var(--text-sub);font-weight:500">${m.label}</td>`;
    schemes.forEach(s => {
      const v = s.perf[m.key];
      const isBest = v === bestVals[m.key];
      html += `<td class="${isBest ? 'best' : ''}">${v}${m.unit}</td>`;
    });
    html += '</tr>';
  });

  html += `<tr><td style="color:var(--text-sub);font-weight:500">再平衡</td>`;
  schemes.forEach(s => { html += `<td style="font-size:12px">${s.rebalance}</td>`; });
  html += '</tr>';

  html += `<tr><td style="color:var(--text-sub);font-weight:500">适合人群</td>`;
  schemes.forEach(s => {
    html += `<td><div style="display:flex;flex-wrap:wrap;gap:4px">${s.suitable.map(t => `<span class="tag" style="font-size:11px">${t}</span>`).join('')}</div></td>`;
  });
  html += '</tr>';

  html += '</tbody></table></div>';
  document.getElementById('compareTableWrap').innerHTML = html;
}

// ──────────────────────────────────────────────
// EVENTS
// ──────────────────────────────────────────────
document.querySelectorAll('[data-filter]').forEach(btn => {
  btn.addEventListener('click', () => {
    const f = btn.dataset.filter;
    document.querySelectorAll(`[data-filter="${f}"]`).forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filters[f] = btn.dataset.val;
    renderGrid();
  });
});

document.getElementById('sortSelect').addEventListener('change', e => {
  sortBy = e.target.value;
  renderGrid();
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchQ = e.target.value.trim();
  renderGrid();
});

// ──────────────────────────────────────────────
// INIT
// ──────────────────────────────────────────────
renderGrid();
</script>
</body>
</html>
